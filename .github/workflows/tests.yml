name: tests

# Triggered only when test-relevant files change. Pure-docs commits
# (CHANGELOG.md, README.md, ad-ldap-query/**) don't fire this workflow.
on:
  push:
    branches: [main]
    paths:
      - 'psldap.ps1'
      - 'psldap.Tests.ps1'
      - 'run-tests.ps1'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'psldap.ps1'
      - 'psldap.Tests.ps1'
      - 'run-tests.ps1'
      - '.github/workflows/tests.yml'

# PowerShell 7+ only (issue #15 Stage 2 dropped Windows PowerShell 5.1).
# `Get-StableStringHash` now calls [SHA256]::HashData(), which is .NET 5+ /
# PS 7.2+ only — running the suite on `powershell.exe` would throw
# MissingMethodException at runtime.

jobs:
  test-pwsh:
    name: PowerShell 7 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable

      - name: Run test suite (3 iterations)
        shell: pwsh
        run: ./run-tests.ps1 -Iterations 3
